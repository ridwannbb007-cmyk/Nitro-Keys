<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NitroKeys</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ======================
      Navigation
====================== -->

<nav class="navbar">

<div class="logo">

🏎️ NitroKeys

</div>

<ul>

<li><a href="#">Home</a></li>

<li><a href="#race">Race</a></li>

<li><a href="#">Garage</a></li>

<li><a href="#">Leaderboard</a></li>

<li><a href="#">About</a></li>

</ul>

<button class="play-btn">

Play Now

</button>

</nav>
<!-- ======================
        Hero Section
====================== -->

<section class="hero">

<div class="hero-content">

<h1>
Race With Your Keyboard
</h1>

<p>
Challenge AI racers, improve your typing speed, and become the fastest driver on the track.
</p>

<div class="hero-buttons">

<button id="startRace" class="primary-btn">
🏁 Start Race
</button>

<button class="secondary-btn">
🎮 Learn More
</button>

</div>

<div class="hero-stats">

<div class="stat-card">
<h2>0</h2>
<span>Best WPM</span>
</div>

<div class="stat-card">
<h2>100%</h2>
<span>Accuracy</span>
</div>

<div class="stat-card">
<h2>10+</h2>
<span>Race Tracks</span>
</div>

</div>

</div>

</section>

<!-- ======================
        Race Section
====================== -->

<section id="race" class="race">

<h2>Typing Race</h2>

<div class="track">

<div class="lane">

<span class="driver-name">
You
</span>

<div class="road">

<div id="playerCar" class="car">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/1f697.svg" alt="Player Car">

</div>

<div class="finish-line"></div>

</div>

</div>

<div class="lane">

<span class="driver-name">
AI Racer
</span>

<div class="road">

<div id="aiCar" class="car">
<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/1f3ce.svg" alt="AI Car">

</div>

<div class="finish-line"></div>

</div>

</div>

</div>

<div class="countdown" id="countdown">
3
</div>

</section>
